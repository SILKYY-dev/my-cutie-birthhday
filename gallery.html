<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look at him 📸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* --- 1. Global Styles & Theme (Consistent with index.html) --- */
        :root {
            --primary-love: #e6007a;
            --secondary-love: #ff85c0;
            --accent-gold: #FFD700;
            --background-dark: #1a0210;
            --text-light: #fdeaf5;
            --font-heading: 'Sacramento', cursive;
            --font-body: 'Playfair Display', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-light);
            background: linear-gradient(-45deg, var(--background-dark), #4b062c, var(--primary-love), #2e031a);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. Floating Hearts Background (Consistent) --- */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 2rem;
            color: var(--secondary-love);
            opacity: 0.1;
            animation: floatHeart 15s linear infinite;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.1;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg);
                opacity: 0.8;
            }
        }

        /* --- 3. Back Button (Consistent) --- */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            color: var(--text-light);
            text-decoration: none;
            font-family: var(--font-sans);
            font-weight: 400;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--primary-love);
            color: white;
            box-shadow: 0 0 15px var(--primary-love);
            transform: scale(1.05);
        }

        /* --- 4. Main Gallery Content --- */
        #gallery-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem 2rem; /* Top padding for back button */
            text-align: center;
        }

        #gallery-container h1 {
            font-family: var(--font-heading);
            font-size: 5em;
            color: var(--accent-gold);
            font-weight: 400;
            text-shadow: 0 0 15px var(--accent-gold);
            opacity: 0;
            animation: fadeInDown 1s 0.5s forwards;
        }

        #gallery-container p {
            font-family: var(--font-sans);
            font-size: 1.2em;
            margin: 0.5rem 0 3rem 0;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInDown 1s 0.8s forwards;
        }

        /* --- 5. Responsive Gallery Grid (THE 5-IMAGE FIX) --- */
        .gallery-grid {
            display: grid;
            /* We use a 6-column "master" grid for flexibility */
            grid-template-columns: repeat(6, 1fr);
            gap: 1.5rem;
            opacity: 0;
            animation: fadeInUp 1s 1.2s forwards;
        }

        .gallery-item {
            position: relative;
            /* All items are 1:1 (square) by default */
            aspect-ratio: 1 / 1; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--secondary-love);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* --- DESKTOP 2-3 LAYOUT --- */
        /* Item 1: Span half the grid (3 of 6 columns) */
        .gallery-item:nth-child(1) {
            grid-column: span 3;
        }
        /* Item 2: Span half the grid (3 of 6 columns) */
        .gallery-item:nth-child(2) {
            grid-column: span 3;
        }
        /* Item 3: Span one-third (2 of 6 columns) */
        .gallery-item:nth-child(3) {
            grid-column: span 2;
        }
        /* Item 4: Span one-third (2 of 6 columns) */
        .gallery-item:nth-child(4) {
            grid-column: span 2;
        }
        /* Item 5: Span one-third (2 of 6 columns) */
        .gallery-item:nth-child(5) {
            grid-column: span 2;
        }
        
        
        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--secondary-love);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fills the square */
            transition: transform 0.4s ease, filter 0.4s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(0.9); /* Dims image slightly so caption pops */
        }

        /* Caption overlay */
        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 2rem 1rem 1rem 1rem;
            color: white;
            font-family: var(--font-body);
            font-size: 1.2em;
            font-weight: 700;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .gallery-item:hover .caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 6. Lightbox (Modal for Full-Screen Image) --- */
        /* (No changes here, this all works) */
        .lightbox {
            display: none; 
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            padding: 1rem;
        }
        
        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
            border: 5px solid var(--accent-gold);
            box-shadow: 0 0 50px var(--accent-gold);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 30px;
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            line-height: 1;
        }
        
        .lightbox-close:hover {
            color: var(--primary-love);
            transform: scale(1.1);
        }

        .lightbox-caption {
            margin-top: 1rem;
            color: var(--text-light);
            font-family: var(--font-body);
            font-size: 1.5em;
            text-align: center;
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
        }

        /* --- 7. Simple Animations --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 8. Responsive Design (The "Masttt" Mobile Fix) --- */
        @media screen and (max-width: 768px) {
            .back-link {
                top: 15px;
                left: 15px;
                padding: 0.6rem 1rem;
            }

            #gallery-container {
                padding: 6rem 1rem 3rem 1rem; 
            }
            
            #gallery-container h1 {
                font-size: 3.2em;
            }
            
            #gallery-container p {
                font-size: 1em;
            }
            
            /* --- MOBILE 1-2-2 LAYOUT --- */
            .gallery-grid {
                /* On mobile, we switch to a simple 2-column grid */
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem; /* Tighter gap for mobile */
            }
            
            .caption {
                font-size: 1em;
                padding: 1.5rem 0.5rem 0.5rem 0.5rem;
            }

            /* Item 1: Spans full 2 columns */
            .gallery-item:nth-child(1) {
                grid-column: span 2;
                /* Make this featured one wider than it is tall */
                aspect-ratio: 16 / 10; 
            }
            /* Item 2: Spans 1 column */
            .gallery-item:nth-child(2) {
                grid-column: span 1;
                aspect-ratio: 1 / 1; /* Back to square */
            }
            /* Item 3: Spans 1 column */
            .gallery-item:nth-child(3) {
                grid-column: span 1;
                aspect-ratio: 1 / 1;
            }
            /* Item 4: Spans 1 column */
            .gallery-item:nth-child(4) {
                grid-column: span 1;
                aspect-ratio: 1 / 1;
            }
            /* Item 5: Spans 1 column */
            .gallery-item:nth-child(5) {
                grid-column: span 1;
                aspect-ratio: 1 / 1;
            }

            /* --- LIGHTBOX MOBILE FIXES --- */
            .lightbox-content {
                max-width: 95%;
                max-height: 70%;
            }

            .lightbox-close {
                top: 20px;
                right: 20px;
                font-size: 3rem;
            }
            
            .lightbox-caption {
                font-size: 1.2em;
                bottom: 8%;
            }
        }
    </style>
</head>

<body>

    <div id="hearts-container"></div>

    <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <main id="gallery-container">
        <h1>Moments celebrating you</h1>
       

        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="qtbd.jpeg" alt="Moments celebrating you 1">
                <div class="caption">the little boy who grew up to become my favorite person</div>
            </div>
            <div class="gallery-item">
                <img src="qtbd2.jpeg" alt="Moments celebrating you 2">
                <div class="caption">pretty lil baby🥹</div>
            </div>
            <div class="gallery-item">
                <img src="qtbd4.jpeg" alt="Moments celebrating you 3">
                <div class="caption"> goofy guy lol</div>
            </div>
            <div class="gallery-item">
                <img src="qtbd3.jpeg" alt="Moments celebrating you 4">
                <div class="caption">my love <3</div>
            </div>
            <div class="gallery-item">
                <img src="qtbd5.jpeg" alt="Moments celebrating you 5">
                <div class="caption">your smile has all my heart💋 </div>
            </div>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>


    <script>
        document.addEventListener("DOMContentLoaded", function() {

            // --- 1. Floating Hearts Logic ---
            const heartsContainer = document.getElementById('hearts-container');
            const heartIcons = ['❤️', '💖', '💕', '💗', '💓', '💞'];

            function createFloatingHearts() {
                setInterval(() => {
                    if (heartsContainer) {
                        const heart = document.createElement('div');
                        heart.classList.add('heart');
                        heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                        heart.style.left = Math.random() * 100 + 'vw';
                        heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                        heart.style.fontSize = (Math.random() * 1 + 1) + 'rem';
                        heart.style.opacity = Math.random() * 0.3 + 0.1;
                        heartsContainer.appendChild(heart);

                        setTimeout(() => {
                            heart.remove();
                        }, 20000);
                    }
                }, 500);
            }
            
            createFloatingHearts();
            
            // --- 2. Lightbox Logic (Perfect) ---
            const galleryItems = document.querySelectorAll('.gallery-item');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');
            const lightboxClose = document.querySelector('.lightbox-close');

            galleryItems.forEach(item => {
                item.addEventListener('click', () => {
                    const img = item.querySelector('img');
                    const caption = item.querySelector('.caption');
                    
                    lightboxImg.src = img.src;
                    lightboxCaption.textContent = caption.textContent;
                    lightbox.classList.add('active');
                });
            });

            function closeLightbox() {
                lightbox.classList.remove('active');
            }

            lightboxClose.addEventListener('click', closeLightbox);
            
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });
        });
    </script>

</body>
</html>
